name: Build A05m Kernel

on:
  workflow_dispatch:
    inputs:
      root_provider:
        description: "Root solution"
        type: choice
        options:
          - ksu-next-stable
          - sukisu-ultra-main
        default: ksu-next-stable

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Free up runner disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /opt/hostedtoolcache
          sudo rm -rf /usr/local/lib/android/sdk/system-images \
                      /usr/local/lib/android/sdk/emulator
          sudo apt-get clean
          df -h

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc bison flex libssl-dev \
            libncurses-dev python3 python3-pip zip unzip rsync kmod cpio \
            device-tree-compiler default-jdk git curl patch

      - name: Download toolchain (with retries)
        run: |
          pip install gdown
          for i in 1 2 3; do
            gdown "https://drive.google.com/uc?id=1um0sIcncTeqVkAE28DwKHlPv1427T5Nb" -O toolchain.tar.gz && break
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
          test -s toolchain.tar.gz || { echo "Could not download the toolchain"; exit 1; }
          tar -xf toolchain.tar.gz

      - name: Neutralize the original setup.sh call in build_kernel.sh
        run: |
          sed -i '/rsuntk\/KernelSU\/main\/kernel\/setup.sh/d' build_kernel.sh

      - name: Integrate KernelSU-Next (stable branch, matches the public manager)
        if: ${{ inputs.root_provider == 'ksu-next-stable' }}
        working-directory: ./kernel-6.6
        run: |
          curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/refs/heads/dev/kernel/setup.sh" | bash -s stable
          test -d KernelSU-Next || { echo "KernelSU-Next integration failed"; exit 1; }
          echo "DRIVER_DIR=KernelSU-Next" >> "$GITHUB_ENV"

      - name: Download the latest KernelSU-Next manager release APK
        if: ${{ inputs.root_provider == 'ksu-next-stable' }}
        run: |
          mkdir -p ksun-manager
          API_URL="https://api.github.com/repos/KernelSU-Next/KernelSU-Next/releases/latest"
          ASSET_URL=$(curl -LSs "$API_URL" | grep "browser_download_url.*\.apk" | head -n1 | cut -d '"' -f4)
          test -n "$ASSET_URL" || { echo "Could not find an .apk asset in the latest KernelSU-Next release"; exit 1; }
          echo "Downloading $ASSET_URL"
          curl -LSs "$ASSET_URL" -o "ksun-manager/KernelSU-Next.apk"
          test -s "ksun-manager/KernelSU-Next.apk" || { echo "Manager APK download failed or is empty"; exit 1; }

      - name: Upload manager APK (KernelSU-Next)
        if: ${{ inputs.root_provider == 'ksu-next-stable' }}
        uses: actions/upload-artifact@v4
        with:
          name: ksun-manager-${{ github.run_number }}
          path: ksun-manager/*.apk
          retention-days: 14

      - name: Integrate SukiSU-Ultra (main branch, matches the public manager)
        if: ${{ inputs.root_provider == 'sukisu-ultra-main' }}
        working-directory: ./kernel-6.6
        run: |
          curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s main
          echo "DRIVER_DIR=KernelSU" >> "$GITHUB_ENV"
          echo "SUKISU_COMMIT=$(cd KernelSU && git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Integrate SUSFS patches into the kernel source (GKI 6.6 branch)
        working-directory: ./kernel-6.6
        run: |
          echo "Cloning the SUSFS repository (gki-android15-6.6 branch)..."
          git clone -b gki-android15-6.6 https://gitlab.com/simonpunk/susfs4ksu.git ../susfs4ksu

          echo "Copying base SUSFS files into the kernel..."
          cp -r ../susfs4ksu/kernel_patches/fs/* ./fs/
          cp -r ../susfs4ksu/kernel_patches/include/linux/* ./include/linux/

          PATCH_DIR="../susfs4ksu/kernel_patches"
          INIT_C="$DRIVER_DIR/kernel/core/init.c"

          echo "[1/2] Applying patch 10 to the $DRIVER_DIR driver"
          if [ ! -f "$PATCH_DIR/KernelSU/10_enable_susfs_for_ksu.patch" ]; then
            echo "10_enable_susfs_for_ksu.patch not found in $PATCH_DIR/KernelSU/"
            exit 1
          fi
          cp "$PATCH_DIR/KernelSU/10_enable_susfs_for_ksu.patch" "./$DRIVER_DIR/"

          (cd "$DRIVER_DIR" && patch -p1 --forward --fuzz=3 < 10_enable_susfs_for_ksu.patch) || \
            echo "Patch 10 did not apply cleanly (likely driver drift), attempting automatic repair."

          if ! grep -q "susfs_init()" "$INIT_C"; then
            if ! grep -q "ksu_feature_init();" "$INIT_C"; then
              echo "Anchor ksu_feature_init() not found in $INIT_C, the driver has changed too much to patch automatically"
              cat "$INIT_C"
              exit 1
            fi
            sed -i '/ksu_feature_init();/i\
          #ifdef CONFIG_KSU_SUSFS\
              susfs_init();\
          #endif // #ifdef KSU_SUSFS\
          ' "$INIT_C"
            grep -q "susfs_init()" "$INIT_C" || { echo "Manual susfs_init() injection failed"; exit 1; }
          fi

          python3 - "$INIT_C" <<'PYEOF'
          import re, sys
          path = sys.argv[1]
          with open(path) as f:
              content = f.read()
          original = content
          needs_fix = any(sym in content for sym in [
              "ksu_lsm_hook_init", "ksu_late_loaded",
              "ksu_syscall_hook_manager_init", "ksu_syscall_hook_manager_exit",
              "ksu_init_symbol_resolver", "ksu_syscall_hook_init(",
          ])
          if not needs_fix:
              print("init.c has no legacy symbols left over from a partially-applied patch, nothing to finish")
              sys.exit(0)

          # 0. Declare extern directly instead of adding a quoted #include. A quoted include
          #    from core/init.c is resolved relative to core/, not the driver root, which is
          #    the same class of problem we hit with uapi/*.h headers. extern sidesteps the
          #    whole path-resolution issue.
          if "SUSFS_AUTOFIX_INIT_EXTERNS" not in content:
              lines = content.split("\n")
              last_include_idx = None
              for i, line in enumerate(lines[:60]):
                  stripped = line.strip()
                  # Stop at the first #if/#ifdef/#ifndef: inserting inside a conditional block
                  # (e.g. "#if defined(__x86_64__)") means our declaration gets compiled out
                  # entirely on an ARM64 build, which is exactly how it disappeared before.
                  if stripped.startswith("#if"):
                      break
                  if stripped.startswith("#include"):
                      last_include_idx = i
              if last_include_idx is not None:
                  extern_block = [
                      "/* SUSFS_AUTOFIX_INIT_EXTERNS */",
                      "extern void ksu_sucompat_init(void);",
                      "extern void ksu_setuid_hook_init(void);",
                  ]
                  for j, line in enumerate(extern_block):
                      lines.insert(last_include_idx + 1 + j, line)
                  content = "\n".join(lines)

          # 1. Delete calls to functions that no longer exist in this driver version (no replacement)
          for func in ["ksu_init_symbol_resolver", "ksu_syscall_hook_init",
                       "ksu_lsm_hook_init", "ksu_syscall_hook_manager_exit",
                       "ksu_sulog_init", "ksu_adb_root_init", "ksu_selinux_hide_init"]:
              content = re.sub(r"^[ \t]*" + func + r"\(\);[ \t]*\n", "", content, flags=re.MULTILINE)

          # 2. Replace the if (ksu_late_loaded) {...} else {...} block with the modern flat sequence
          pattern = re.compile(r"[ \t]*if\s*\(ksu_late_loaded\)\s*\{.*?\}\s*else\s*\{.*?\}\n", re.DOTALL)
          replacement = (
              "\tksu_sucompat_init();\n\n"
              "\tksu_setuid_hook_init();\n\n"
              "\tksu_sulog_init();\n\n"
              "\tksu_adb_root_init();\n\n"
              "\tksu_selinux_hide_init();\n\n"
              "\tksu_allowlist_init();\n\n"
              "\tksu_throne_tracker_init();\n\n"
              "\tksu_ksud_init();\n\n"
              "\tksu_file_wrapper_init();\n\n"
          )
          content, n = pattern.subn(replacement, content, count=1)
          if n != 1:
              print(f"Could not find the if(ksu_late_loaded)/else block exactly once (found {n}) in kernelsu_init, needs manual review")
              sys.exit(1)

          # 3. In kernelsu_exit(), make ksu_ksud_exit() unconditional
          content, n2 = re.subn(
              r"if\s*\(!ksu_late_loaded\)\s*\n\s*ksu_ksud_exit\(\);",
              "ksu_ksud_exit();",
              content,
          )

          if content == original:
              print("Script made no changes despite detecting legacy symbols, needs manual review")
              sys.exit(1)

          with open(path, "w") as f:
              f.write(content)

          remaining = [sym for sym in [
              "ksu_lsm_hook_init", "ksu_late_loaded",
              "ksu_syscall_hook_manager_init", "ksu_syscall_hook_manager_exit",
              "ksu_init_symbol_resolver", "ksu_syscall_hook_init(",
          ] if sym in content]
          if remaining:
              print(f"Legacy symbols still remain after the fix: {remaining}")
              with open(path, "w") as f:
                  f.write(content)
              sys.exit(1)
          if "extern void ksu_sucompat_init(void);" not in content or "extern void ksu_setuid_hook_init(void);" not in content:
              print("extern declarations for ksu_sucompat_init/ksu_setuid_hook_init were not inserted")
              sys.exit(1)
          print("init.c finished: legacy symbols removed, modern calls inserted, externs added")
          PYEOF

          echo "[2/2] Applying patch 50 to the kernel tree (fs/, core hooks)..."
          PATCH_50=$(ls $PATCH_DIR/50_add_susfs_in_*.patch | head -n 1)
          test -n "$PATCH_50" || { echo "50_add_susfs_in_*.patch not found"; exit 1; }

          patch -p1 --forward < "$PATCH_50" || echo "Some hunks of patch 50 failed, starting manual repair of fs/*..."

          # --- START OF fs/* AUTO-REPAIR ---
          sed -i '1i #include <linux/sched.h>\n#include <linux/thread_info.h>\n#include <linux/cred.h>' include/linux/susfs_def.h

          for f in mm/memory.c fs/namespace.c fs/open.c fs/proc/base.c fs/exec.c; do
            if ! grep -q "linux/susfs_def.h" "$f"; then
              LAST_INCLUDE=$(grep -n "^#include" "$f" | tail -1 | cut -d: -f1)
              if [ -n "$LAST_INCLUDE" ]; then
                sed -i "${LAST_INCLUDE}a #ifdef CONFIG_KSU_SUSFS\n#include <linux/susfs_def.h>\n#endif" "$f"
              else
                sed -i '1i #ifdef CONFIG_KSU_SUSFS\n#include <linux/susfs_def.h>\n#endif' "$f"
              fi
            fi
          done

          # Unique markers instead of guessing "is this already applied?" from generic symbol
          # names — that approach gave false positives when patch 50 declared one symbol but
          # not another from the same block, or when a generic anchor like "retry:" already
          # existed in the file for unrelated reasons.
          if ! grep -q "SUSFS_AUTOFIX_NAMESPACE" fs/namespace.c; then
            sed -i '/#include <linux\/susfs_def.h>/a #ifdef CONFIG_KSU_SUSFS_SUS_MOUNT\n/* SUSFS_AUTOFIX_NAMESPACE */\nextern bool susfs_is_current_ksu_domain(void);\nextern struct static_key_true susfs_is_sdcard_android_data_not_decrypted;\n#define CL_COPY_MNT_NS BIT(25)\n#endif' fs/namespace.c
          fi

          if ! grep -q "SUSFS_AUTOFIX_OPEN_EXTERNS" fs/open.c; then
            sed -i '/#include <linux\/susfs_def.h>/a #ifdef CONFIG_KSU_SUSFS\n/* SUSFS_AUTOFIX_OPEN_EXTERNS */\nextern struct static_key_true ksu_su_compat_enabled;\nextern bool __ksu_is_allow_uid_for_current(uid_t uid);\nextern int ksu_handle_faccessat(int *dfd, const char __user **filename_user, int *mode, int *flags);\n#endif' fs/open.c
          fi

          if ! grep -q "SUSFS_AUTOFIX_RETRY_LABEL" fs/open.c; then
            sed -i '/fd = get_unused_fd_flags(how->flags);/a #ifdef CONFIG_KSU_SUSFS_OPEN_REDIRECT\n/* SUSFS_AUTOFIX_RETRY_LABEL */\nretry:\n#endif' fs/open.c
          fi

          if ! grep -q "SUSFS_AUTOFIX_OPEN_REDIRECT_BLOCK" fs/open.c; then
            sed -i '/struct file \*f = do_filp_open(dfd, tmp, &op);/a \
          #ifdef CONFIG_KSU_SUSFS_OPEN_REDIRECT\n\
          \t\t/* SUSFS_AUTOFIX_OPEN_REDIRECT_BLOCK */\n\
          \t\tif (!is_inode_open_redirect && f && !IS_ERR(f)) {\n\
          \t\t\tstruct inode *inode = file_inode(f);\n\
          \t\t\tif (SUSFS_IS_INODE_OPEN_REDIRECT_WITHOUT_UID_CHECK(inode)) {\n\
          \t\t\t\tfake_filename = susfs_open_redirect_spoof_do_sys_openat(inode);\n\
          \t\t\t\tif (fake_filename && !IS_ERR(fake_filename)) {\n\
          \t\t\t\t\tis_inode_open_redirect = true;\n\
          \t\t\t\t\tfilp_close(f, NULL);\n\
          \t\t\t\t\tputname(tmp);\n\
          \t\t\t\t\ttmp = fake_filename;\n\
          \t\t\t\t\tgoto retry;\n\
          \t\t\t\t}\n\
          \t\t\t}\n\
          \t\t}\n\
          #endif' fs/open.c
          fi

          if ! grep -q "SUSFS_AUTOFIX_EXEC" fs/exec.c; then
            sed -i '/#include <linux\/susfs_def.h>/a #ifdef CONFIG_KSU_SUSFS\n/* SUSFS_AUTOFIX_EXEC */\nextern struct static_key_true ksu_su_compat_enabled;\nextern struct static_key_true susfs_is_sdcard_android_data_not_decrypted;\nextern bool __ksu_is_allow_uid_for_current(uid_t uid);\nextern int ksu_handle_execveat(int *fd, struct filename **filename_ptr, void *argv, void *envp, int *flags);\nextern int ksu_handle_execveat_sucompat(int *fd, struct filename **filename_ptr, void *argv, void *envp, int *flags);\n#endif' fs/exec.c
          fi

          for check in "fs/namespace.c:SUSFS_AUTOFIX_NAMESPACE" "fs/open.c:SUSFS_AUTOFIX_OPEN_EXTERNS" "fs/open.c:SUSFS_AUTOFIX_RETRY_LABEL" "fs/open.c:SUSFS_AUTOFIX_OPEN_REDIRECT_BLOCK" "fs/exec.c:SUSFS_AUTOFIX_EXEC"; do
            file="${check%%:*}"
            marker="${check##*:}"
            grep -q "$marker" "$file" || { echo "$marker was not inserted into $file, the sed anchor did not match, needs manual review"; exit 1; }
          done
          # --- END OF fs/* AUTO-REPAIR ---

          if ls $PATCH_DIR/51_susfs_add_hook_in_*.patch 1> /dev/null 2>&1; then
            patch -p1 --forward < $(ls $PATCH_DIR/51_susfs_add_hook_in_*.patch | head -n 1) || {
              echo "Patch 51 failed, remaining *.rej files:"
              find . -name '*.rej' -exec echo "--- {} ---" \; -exec cat {} \;
              exit 1
            }
          fi

          grep -q "susfs" fs/Makefile || { echo "Patch 50 did not modify fs/Makefile as expected, aborting instead of guessing a manual fix"; exit 1; }

          if [ "$DRIVER_DIR" == "KernelSU" ]; then
            # SukiSU-Ultra-specific: the base kernel repo already ships an old vendored driver
            # at drivers/kernelsu (wired via drivers/Makefile and drivers/Kconfig). setup.sh
            # replaces it with a symlink to ../KernelSU/kernel, which is what we just patched.
            KBUILD_FILE="KernelSU/kernel/Kbuild"
            if [ -f "$KBUILD_FILE" ] && ! grep -q "infra/symbol_resolver.o" "$KBUILD_FILE"; then
              # infra/symbol_resolver.o is missing from kernelsu-objs even though
              # feature/uts_spoof.c (which is listed) depends on it at link time.
              sed -i '/infra\/su_mount_ns.o/a kernelsu-objs += infra/symbol_resolver.o' "$KBUILD_FILE"
              grep -q "infra/symbol_resolver.o" "$KBUILD_FILE" || { echo "Could not insert infra/symbol_resolver.o into $KBUILD_FILE"; exit 1; }
            fi

            grep -q "susfs_init()" drivers/kernelsu/core/init.c || { echo "drivers/kernelsu/core/init.c has no susfs_init(), the symlink is not pointing at the patched KernelSU/kernel"; exit 1; }
          fi

      - name: Pin down strict Clang errors
        working-directory: ./kernel-6.6
        run: |
          sed -i '1i #pragma GCC diagnostic ignored "-Warray-bounds"' include/linux/signal.h

          if [ "${{ inputs.root_provider }}" == "sukisu-ultra-main" ]; then
            SELINUX_HIDE_C="KernelSU/kernel/feature/selinux_hide.c"
            if [ -f "$SELINUX_HIDE_C" ]; then
              # This file checks "if (function_name)" instead of a function pointer, which is
              # always true and is rejected by modern Clang with -Werror. It's upstream
              # SukiSU-Ultra code, not something to rewrite by hand here.
              sed -i '1i #pragma GCC diagnostic ignored "-Wpointer-bool-conversion"' "$SELINUX_HIDE_C"
            fi
          fi

      - name: Enable CONFIG_KSU and SUSFS in the overlay config
        run: |
          CFG=$(grep -rl "CONFIG_KSU" --include="*.config" . 2>/dev/null | head -n1)
          if [ -z "$CFG" ]; then
            CFG="./kernel/kernel_device_modules-6.6/kernel/configs/mt6768_overlay.config"
            echo "No existing config found, using default: $CFG"
          fi
          echo "Using config: $CFG"

          if ! grep -q "CONFIG_KSU=y" "$CFG"; then
            echo "CONFIG_KSU=y" >> "$CFG"
          fi

          sed -i '/CONFIG_KSU_SUSFS/d' "$CFG"
          cat <<EOF >> "$CFG"
          CONFIG_KSU_SUSFS=y
          CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_PATH=y
          CONFIG_KSU_SUSFS_SUS_MOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_KSTAT=y
          CONFIG_KSU_SUSFS_SUS_OVERLAYFS=y
          CONFIG_KSU_SUSFS_TRY_UMOUNT=y
          CONFIG_KSU_SUSFS_SPOOF_UNAME=y
          CONFIG_KSU_SUSFS_ENABLE_LOG=y
          CONFIG_KSU_SUSFS_OPEN_REDIRECT=y
          CONFIG_KSU_SUSFS_SUS_SU=y
          CONFIG_KSU_SUSFS_SUS_MAP=y
          EOF

      - name: Cache Bazel
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bazel
            ~/.cache/bazelisk
          key: bazel-cache-${{ runner.os }}-${{ inputs.root_provider }}-${{ hashFiles('kernel/WORKSPACE') }}

      - name: Build
        run: |
          chmod +x build_kernel.sh
          bash build_kernel.sh

      - name: Verify the zip was generated
        run: |
          ls -la *.zip || { echo "No zip was generated, check the Build step log"; exit 1; }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: a05m-kernel-${{ inputs.root_provider }}-${{ github.run_number }}
          path: "*.zip"
          retention-days: 14
