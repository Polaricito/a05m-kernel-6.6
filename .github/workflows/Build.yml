name: Build A05m Kernel (KSU-Next + SUSFS)

on:
  workflow_dispatch:
    inputs:
      use_susfs:
        description: "Integrar SUSFS (rama next-susfs, experimental)"
        type: boolean
        default: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Liberar espacio en el runner
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo apt-get clean

      - name: Instalar dependencias
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc bison flex libssl-dev \
            libncurses-dev python3 python3-pip zip unzip rsync kmod cpio \
            device-tree-compiler default-jdk git curl patch

      - name: Descargar toolchain
        run: |
          pip install gdown
          gdown "https://drive.google.com/uc?id=1vsQfRgdNHlD0md9tF7j5fpkL_17whzbH" -O toolchain.tar.gz
          tar -xf toolchain.tar.gz

      - name: Neutralizar el setup.sh viejo en build_kernel.sh
        run: |
          sed -i '/rsuntk\/KernelSU\/main\/kernel\/setup.sh/d' build_kernel.sh
          grep -n "setup.sh" build_kernel.sh || echo "Línea vieja removida OK"

      - name: Integrar KernelSU-Next (rama next-susfs)
        working-directory: ./kernel-6.6
        run: |
          curl -LSs "https://raw.githubusercontent.com/pershoot/KernelSU-Next/refs/heads/next-susfs/kernel/setup.sh" | bash -s next-susfs

      - name: Clonar patches de SUSFS (gki-android15-6.6)
        if: ${{ inputs.use_susfs }}
        run: |
          git clone --depth 1 -b gki-android15-6.6 https://gitlab.com/simonpunk/susfs4ksu.git

      - name: Aplicar patches de SUSFS
        if: ${{ inputs.use_susfs }}
        working-directory: ./kernel-6.6
        run: |
          cp ../susfs4ksu/kernel_patches/fs/* fs/ 2>/dev/null || true
          cp ../susfs4ksu/kernel_patches/include/linux/* include/linux/ 2>/dev/null || true
          cp ../susfs4ksu/kernel_patches/50_add_susfs_in_gki-android15-6.6.patch . 2>/dev/null || true
          cp ../susfs4ksu/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch KernelSU-Next/ 2>/dev/null || true

          patch -p1 --fuzz=3 < 50_add_susfs_in_gki-android15-6.6.patch || \
            echo "⚠️ Hubo rechazos (.rej) — revisar log, puede necesitar ajuste manual"

          cd KernelSU-Next
          patch -p1 --fuzz=3 < 10_enable_susfs_for_ksu.patch || \
            echo "⚠️ Rechazo en patch de KernelSU-Next — revisar"

      - name: Habilitar configs de SUSFS
        if: ${{ inputs.use_susfs }}
        run: |
          CFG=$(find kernel/kernel_device_modules-6.6/kernel/configs -iname "kernelsu.config" | head -n1)
          echo "Usando config: $CFG"
          cat >> "$CFG" << 'EOF'
          CONFIG_KSU_SUSFS=y
          CONFIG_KSU_SUSFS_SUS_PATH=y
          CONFIG_KSU_SUSFS_SUS_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_KSTAT=y
          CONFIG_KSU_SUSFS_SPOOF_UNAME=y
          CONFIG_KSU_SUSFS_SPOOF_CMDLINE=y
          CONFIG_KSU_SUSFS_OPEN_REDIRECT=y
          CONFIG_KSU_SUSFS_SUS_SU=n
          EOF

      - name: Compilar
        run: |
          chmod +x build_kernel.sh
          bash build_kernel.sh

      - name: Subir artifact
        uses: actions/upload-artifact@v4
        with:
          name: a05m-kernel-susfs-${{ github.run_number }}
          path: "*.zip"
          retention-days: 14

      - name: Crear Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-susfs-${{ github.run_number }}
          files: "*.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
