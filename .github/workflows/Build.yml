name: Build A05m Kernel

on:
  workflow_dispatch:
    inputs:
      root_provider:
        description: "Solución de root"
        type: choice
        options:
          - ksu-next-stable
          - sukisu-ultra-v4.1.3
        default: ksu-next-stable

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Liberar espacio en el runner
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /opt/hostedtoolcache
          sudo rm -rf /usr/local/lib/android/sdk/system-images \
                      /usr/local/lib/android/sdk/emulator
          sudo apt-get clean
          df -h

      - name: Instalar dependencias
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc bison flex libssl-dev \
            libncurses-dev python3 python3-pip zip unzip rsync kmod cpio \
            device-tree-compiler default-jdk git curl patch

      - name: Descargar toolchain (con reintentos)
        run: |
          pip install gdown
          for i in 1 2 3; do
            gdown "https://drive.google.com/uc?id=1Nq0bm5VMJKt32RRV0_AzBPvpH6YflE5F" -O toolchain.tar.gz && break
            echo "Intento $i falló, reintentando en 10s..."
            sleep 10
          done
          test -s toolchain.tar.gz || { echo "❌ No se pudo descargar el toolchain"; exit 1; }
          tar -xf toolchain.tar.gz

      - name: Neutralizar setup.sh original en build_kernel.sh
        run: |
          sed -i '/rsuntk\/KernelSU\/main\/kernel\/setup.sh/d' build_kernel.sh

      - name: Integrar KernelSU-Next (tag v3.2.0, matchea manager público)
        if: ${{ inputs.root_provider == 'ksu-next-stable' }}
        working-directory: ./kernel-6.6
        run: |
          curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/refs/heads/dev/kernel/setup.sh" | bash -s v3.2.0
          test -d KernelSU-Next || { echo "❌ Falló la integración de KernelSU-Next"; exit 1; }
          echo "KSUN_COMMIT=$(cd KernelSU-Next && git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Setup Java (solo para compilar el manager de KernelSU-Next)
        if: ${{ inputs.root_provider == 'ksu-next-stable' }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Compilar manager de KernelSU-Next (mismo commit que el kernel)
        if: ${{ inputs.root_provider == 'ksu-next-stable' }}
        run: |
          git clone https://github.com/KernelSU-Next/KernelSU-Next.git ksun-manager-src
          cd ksun-manager-src
          git checkout "$KSUN_COMMIT"
          cd manager
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          chmod +x gradlew
          ./gradlew assembleRelease
          find . -name "*.apk"

      - name: Subir manager APK (KernelSU-Next)
        if: ${{ inputs.root_provider == 'ksu-next-stable' }}
        uses: actions/upload-artifact@v4
        with:
          name: ksun-manager-${{ github.run_number }}
          path: ksun-manager-src/manager/**/*.apk
          retention-days: 14

      - name: Integrar SukiSU-Ultra (tag v4.1.3, matchea manager público)
        if: ${{ inputs.root_provider == 'sukisu-ultra-v4.1.3' }}
        working-directory: ./kernel-6.6
        run: |
          curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s main
          echo "SUKISU_COMMIT=$(cd KernelSU && git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Integrar parches SUSFS al código del Kernel (Rama GKI 6.6)
        if: ${{ inputs.root_provider == 'sukisu-ultra-v4.1.3' }}
        working-directory: ./kernel-6.6
        run: |
          echo "📥 Clonando repositorio de SUSFS (Rama gki-android15-6.6)..."
          git clone -b gki-android15-6.6 https://gitlab.com/simonpunk/susfs4ksu.git ../susfs4ksu

          echo "📂 Copiando archivos base de SUSFS al kernel..."
          cp -r ../susfs4ksu/kernel_patches/fs/* ./fs/
          cp -r ../susfs4ksu/kernel_patches/include/linux/* ./include/linux/

          PATCH_DIR="../susfs4ksu/kernel_patches"
          INIT_C="KernelSU/kernel/core/init.c"

          echo "🩹 [1/2] Aplicando parche 10 sobre el driver de SukiSU-Ultra (KernelSU/)"
          if [ ! -f "$PATCH_DIR/KernelSU/10_enable_susfs_for_ksu.patch" ]; then
            echo "❌ No se encontró 10_enable_susfs_for_ksu.patch en $PATCH_DIR/KernelSU/"
            exit 1
          fi
          cp "$PATCH_DIR/KernelSU/10_enable_susfs_for_ksu.patch" ./KernelSU/

          (cd KernelSU && patch -p1 --forward --fuzz=3 < 10_enable_susfs_for_ksu.patch) || \
            echo "⚠️ El parche 10 no aplicó completo (probable drift en init.c), se intentará reparar automáticamente."

          if ! grep -q "susfs_init()" "$INIT_C"; then
            echo "🔧 susfs_init() no quedó insertado en init.c — inyectando manualmente junto a ksu_feature_init()"
            if ! grep -q "ksu_feature_init();" "$INIT_C"; then
              echo "❌ No se encontró el ancla ksu_feature_init() en $INIT_C — el driver cambió demasiado, hay que revisar a mano"
              cat "$INIT_C"
              exit 1
            fi
            sed -i '/ksu_feature_init();/i\
          #ifdef CONFIG_KSU_SUSFS\
              susfs_init();\
          #endif // #ifdef KSU_SUSFS\
          ' "$INIT_C"
            grep -q "susfs_init()" "$INIT_C" || { echo "❌ La inyección manual de susfs_init() falló"; exit 1; }
            echo "✅ susfs_init() inyectado correctamente en init.c"
          else
            echo "✅ susfs_init() ya presente en init.c (el parche aplicó bien)."
          fi

          echo "🩹 [2/2] Aplicando parche 50 sobre el árbol del kernel (fs/, hooks core)..."
          PATCH_50=$(ls $PATCH_DIR/50_add_susfs_in_*.patch | head -n 1)
          test -n "$PATCH_50" || { echo "❌ No se encontró parche 50_add_susfs_in_*.patch"; exit 1; }
          
          patch -p1 --forward < "$PATCH_50" || echo "⚠️ Algunos hunks del parche 50 fallaron debido a código de MediaTek/Samsung. Iniciando inyección manual..."

          # --- INICIO DE AUTO-REPARACIÓN DE PATCH DRIFT ---
          echo "🛠️ Inyectando manualmente los hunks rechazados de SUSFS..."
          
          # mm/memory.c
          sed -i '/#include <linux\/zswap.h>/a #ifdef CONFIG_KSU_SUSFS_SUS_MAP\n#include <linux\/susfs_def.h>\n#endif \/\/ #ifdef CONFIG_KSU_SUSFS_SUS_MAP' mm/memory.c
          
          # fs/namespace.c
          sed -i '/#include <linux\/mnt_idmapping.h>/a #ifdef CONFIG_KSU_SUSFS_SUS_MOUNT\n#include <linux\/susfs_def.h>\n#endif \/\/ #ifdef CONFIG_KSU_SUSFS_SUS_MOUNT' fs/namespace.c
          sed -i '/#include <trace\/hooks\/fs.h>/a #ifdef CONFIG_KSU_SUSFS_SUS_MOUNT\nextern bool susfs_is_current_ksu_domain(void);\nextern struct static_key_true susfs_is_sdcard_android_data_not_decrypted;\n#define CL_COPY_MNT_NS BIT(25) \/* used by copy_mnt_ns() *\/\n#endif \/\/ #ifdef CONFIG_KSU_SUSFS_SUS_MOUNT' fs/namespace.c
          
          # fs/open.c (Inyección de ksu_handle_faccessat)
          sed -i '/static long do_faccessat(/i #ifdef CONFIG_KSU_SUSFS\nextern struct static_key_true ksu_su_compat_enabled;\nextern bool __ksu_is_allow_uid_for_current(uid_t uid);\nextern int ksu_handle_faccessat(int *dfd, const char __user **filename_user, int *mode, int *flags);\n#endif\n' fs/open.c
          
          # fs/open.c (Inyección de redirección OPEN_REDIRECT)
          sed -i '/fd = get_unused_fd_flags(how->flags);/a #ifdef CONFIG_KSU_SUSFS_OPEN_REDIRECT\nretry:\n#endif \/\/ #ifdef CONFIG_KSU_SUSFS_OPEN_REDIRECT' fs/open.c
          
          sed -i '/struct file \*f = do_filp_open(dfd, tmp, &op);/a \
          #ifdef CONFIG_KSU_SUSFS_OPEN_REDIRECT\n\
          \t\tif (!is_inode_open_redirect && f && !IS_ERR(f)) {\n\
          \t\t\tstruct inode *inode = file_inode(f);\n\
          \t\t\tif (SUSFS_IS_INODE_OPEN_REDIRECT_WITHOUT_UID_CHECK(inode)) {\n\
          \t\t\t\tfake_filename = susfs_open_redirect_spoof_do_sys_openat(inode);\n\
          \t\t\t\tif (fake_filename && !IS_ERR(fake_filename)) {\n\
          \t\t\t\t\tis_inode_open_redirect = true;\n\
          \t\t\t\t\tfilp_close(f, NULL);\n\
          \t\t\t\t\tputname(tmp);\n\
          \t\t\t\t\ttmp = fake_filename;\n\
          \t\t\t\t\tgoto retry;\n\
          \t\t\t\t}\n\
          \t\t\t}\n\
          \t\t}\n\
          #endif \/\/ #ifdef CONFIG_KSU_SUSFS_OPEN_REDIRECT' fs/open.c
          
          # fs/proc/base.c
          sed -i '/#include <linux\/dma-buf.h>/a #if defined(CONFIG_KSU_SUSFS_SUS_MAP) || defined(CONFIG_KSU_SUSFS_OPEN_REDIRECT)\n#include <linux\/susfs_def.h>\n#endif \/\/ #if defined(CONFIG_KSU_SUSFS_SUS_MAP) || defined(CONFIG_KSU_SUSFS_OPEN_REDIRECT)' fs/proc/base.c
          
          # fs/exec.c
          sed -i '/static int do_execveat_common(/i #ifdef CONFIG_KSU_SUSFS\nextern struct static_key_true ksu_su_compat_enabled;\nextern struct static_key_true susfs_is_sdcard_android_data_not_decrypted;\nextern bool __ksu_is_allow_uid_for_current(uid_t uid);\nextern int ksu_handle_execveat(int *fd, struct filename **filename_ptr, void *argv, void *envp, int *flags);\nextern int ksu_handle_execveat_sucompat(int *fd, struct filename **filename_ptr, void *argv, void *envp, int *flags);\n#endif\n' fs/exec.c

          echo "✅ Auto-reparación completada con éxito."
          # --- FIN DE AUTO-REPARACIÓN ---

          if ls $PATCH_DIR/51_susfs_add_hook_in_*.patch 1> /dev/null 2>&1; then
            patch -p1 --forward < $(ls $PATCH_DIR/51_susfs_add_hook_in_*.patch | head -n 1) || {
              echo "❌ Falló el parche 51 — revisar *.rej:"
              find . -name '*.rej' -exec echo "--- {} ---" \; -exec cat {} \;
              exit 1
            }
          else
            echo "ℹ️ Parche 51 no encontrado, los hooks probablemente estén unificados en el parche 50."
          fi

          grep -q "susfs" fs/Makefile || { echo "❌ El parche 50 no modificó fs/Makefile como se esperaba, abortando en vez de inyectar a mano"; exit 1; }

      - name: Setup Java (solo para compilar el manager de SukiSU-Ultra)
        if: ${{ inputs.root_provider == 'sukisu-ultra-v4.1.3' }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Compilar manager de SukiSU-Ultra (mismo commit que el kernel)
        if: ${{ inputs.root_provider == 'sukisu-ultra-v4.1.3' }}
        run: |
          git clone https://github.com/SukiSU-Ultra/SukiSU-Ultra.git suki-manager-src
          cd suki-manager-src
          git checkout "$SUKISU_COMMIT"
          cd manager
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          chmod +x gradlew
          ./gradlew assembleRelease
          find . -name "*.apk"

      - name: Subir manager APK
        if: ${{ inputs.root_provider == 'sukisu-ultra-v4.1.3' }}
        uses: actions/upload-artifact@v4
        with:
          name: sukisu-manager-${{ github.run_number }}
          path: suki-manager-src/manager/**/*.apk
          retention-days: 14

      - name: Habilitar CONFIG_KSU y SUSFS en overlay
        run: |
          CFG=$(grep -rl "CONFIG_KSU" --include="*.config" . 2>/dev/null | head -n1)
          if [ -z "$CFG" ]; then
            CFG="./kernel/kernel_device_modules-6.6/kernel/configs/mt6768_overlay.config"
            echo "⚠️ No se encontró config existente, usando default: $CFG"
          fi
          echo "Usando config: $CFG"
          
          if ! grep -q "CONFIG_KSU=y" "$CFG"; then
            echo "CONFIG_KSU=y" >> "$CFG"
          fi
          
          if [ "${{ inputs.root_provider }}" == "sukisu-ultra-v4.1.3" ]; then
            echo "Inyectando flags completas de SUSFS..."
            sed -i '/CONFIG_KSU_SUSFS/d' "$CFG"
            cat <<EOF >> "$CFG"
          CONFIG_KSU_SUSFS=y
          CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_PATH=y
          CONFIG_KSU_SUSFS_SUS_MOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_KSTAT=y
          CONFIG_KSU_SUSFS_SUS_OVERLAYFS=y
          CONFIG_KSU_SUSFS_TRY_UMOUNT=y
          CONFIG_KSU_SUSFS_SPOOF_UNAME=y
          CONFIG_KSU_SUSFS_ENABLE_LOG=y
          CONFIG_KSU_SUSFS_OPEN_REDIRECT=y
          CONFIG_KSU_SUSFS_SUS_SU=y
          CONFIG_KSU_SUSFS_SUS_MAP=y
          EOF
          fi

      - name: Cache de Bazel
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bazel
            ~/.cache/bazelisk
          key: bazel-cache-${{ runner.os }}-${{ inputs.root_provider }}-${{ hashFiles('kernel/WORKSPACE') }}

      - name: Compilar
        run: |
          chmod +x build_kernel.sh
          bash build_kernel.sh

      - name: Verificar que se generó el zip
        run: |
          ls -la *.zip || { echo "❌ No se generó ningún zip, revisar log de Compilar"; exit 1; }

      - name: Subir artifact
        uses: actions/upload-artifact@v4
        with:
          name: a05m-kernel-${{ inputs.root_provider }}-${{ github.run_number }}
          path: "*.zip"
          retention-days: 14
