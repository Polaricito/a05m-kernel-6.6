name: Build A05m Kernel

on:
  workflow_dispatch:
    inputs:
      root_provider:
        description: "Solución de root"
        type: choice
        options:
          - ksu-next-stable
          - sukisu-ultra-v4.1.3
        default: ksu-next-stable

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Liberar espacio en el runner
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo apt-get clean
          df -h

      - name: Instalar dependencias
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc bison flex libssl-dev \
            libncurses-dev python3 python3-pip zip unzip rsync kmod cpio \
            device-tree-compiler default-jdk git curl patch

      - name: Descargar toolchain (multi-fuente con reintentos)
        run: |
          pip install gdown
          
          # Función para intentar descargar con reintentos
          download_with_retries() {
            local url=$1
            local output=$2
            local max_attempts=3
            local wait_time=10
            
            for attempt in $(seq 1 $max_attempts); do
              echo "📥 Intento $attempt: Descargando desde $url"
              
              if [[ $url == *"drive.google.com"* ]]; then
                # Google Drive con gdown
                if gdown "$url" -O "$output" 2>/dev/null; then
                  echo "✅ Descarga exitosa desde Google Drive"
                  return 0
                fi
              elif [[ $url == *"dropbox.com"* ]]; then
                # Dropbox con wget (agregar ?dl=1 para forzar descarga)
                if wget -q "$url?dl=1" -O "$output" 2>/dev/null; then
                  echo "✅ Descarga exitosa desde Dropbox"
                  return 0
                fi
              else
                # URL genérica con wget/curl
                if wget -q "$url" -O "$output" 2>/dev/null || curl -L "$url" -o "$output" 2>/dev/null; then
                  echo "✅ Descarga exitosa desde $url"
                  return 0
                fi
              fi
              
              if [ $attempt -lt $max_attempts ]; then
                wait_time=$((wait_time * 2))  # Exponential backoff
                echo "⏳ Reintentando en ${wait_time}s..."
                sleep "$wait_time"
              fi
            done
            
            return 1
          }
          
          # Array de URLs de fuentes alternativas (prioridad)
           # Array de URLs de fuentes alternativas (prioridad)
           declare -a SOURCES=(
             "https://drive.google.com/uc?id=1vsQfRgdNHlD0md9tF7j5fpkL_17whzbH"
             "https://www.dropbox.com/s/YOUR-FILE-ID/toolchain.tar.gz"
             "https://your-s3-bucket.s3.amazonaws.com/toolchain.tar.gz"
             "https://github.com/YOUR-RELEASES-URL/toolchain.tar.gz"
           )
          
          # Intentar descargar desde cada fuente
          downloaded=false
          for source in "${SOURCES[@]}"; do
            if download_with_retries "$source" "toolchain.tar.gz"; then
              downloaded=true
              break
            fi
            echo "❌ Falló descargar desde $source, intentando siguiente fuente..."
          done
          
          # Verificar que la descarga fue exitosa
          if [ "$downloaded" = false ] || [ ! -s toolchain.tar.gz ]; then
            echo "❌ No se pudo descargar el toolchain desde ninguna fuente"
            exit 1
          fi
          
          echo "✅ Toolchain descargado exitosamente"
          tar -xf toolchain.tar.gz

      - name: Neutralizar setup.sh original en build_kernel.sh
        run: |
          sed -i '/rsuntk\/KernelSU\/main\/kernel\/setup.sh/d' build_kernel.sh

      - name: Integrar KernelSU-Next (tag v3.2.0, matchea manager público)
        if: ${{ inputs.root_provider == 'ksu-next-stable' }}
        working-directory: ./kernel-6.6
        run: |
          curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/refs/heads/dev/kernel/setup.sh" | bash -s v3.2.0

          test -d KernelSU-Next || { echo "❌ Falló la integración de KernelSU-Next"; exit 1; }
          echo "KSUN_COMMIT=$(cd KernelSU-Next && git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Setup Java (solo para compilar el manager de KernelSU-Next)
        if: ${{ inputs.root_provider == 'ksu-next-stable' }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Compilar manager de KernelSU-Next (mismo commit que el kernel)
        if: ${{ inputs.root_provider == 'ksu-next-stable' }}
        run: |
          git clone https://github.com/KernelSU-Next/KernelSU-Next.git ksun-manager-src
          cd ksun-manager-src
          git checkout "$KSUN_COMMIT"
          cd manager
          chmod +x gradlew
          ./gradlew assembleRelease -x signReleaseBundle --warning-mode all --stacktrace \
            -Dorg.gradle.warning.mode=none \
            -Dorg.gradle.java.home=$JAVA_HOME
          find . -name "*.apk"

      - name: Subir manager APK (KernelSU-Next)
        if: ${{ inputs.root_provider == 'ksu-next-stable' }}
        uses: actions/upload-artifact@v4
        with:
          name: ksun-manager-${{ github.run_number }}
          path: ksun-manager-src/manager/**/*.apk
          retention-days: 14

      - name: Integrar SukiSU-Ultra (tag v4.1.3, matchea manager público)
        if: ${{ inputs.root_provider == 'sukisu-ultra-v4.1.3' }}
        working-directory: ./kernel-6.6
        run: |
          curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s v4.1.3
          echo "SUKISU_COMMIT=$(cd KernelSU && git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Setup Java (solo para compilar el manager de SukiSU-Ultra)
        if: ${{ inputs.root_provider == 'sukisu-ultra-v4.1.3' }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Compilar manager de SukiSU-Ultra (mismo commit que el kernel)
        if: ${{ inputs.root_provider == 'sukisu-ultra-v4.1.3' }}
        run: |
          git clone https://github.com/SukiSU-Ultra/SukiSU-Ultra.git suki-manager-src
          cd suki-manager-src
          git checkout "$SUKISU_COMMIT"
          cd manager
          chmod +x gradlew
          ./gradlew assembleRelease -x signReleaseBundle --warning-mode all --stacktrace \
            -Dorg.gradle.warning.mode=none \
            -Dorg.gradle.java.home=$JAVA_HOME
          find . -name "*.apk"

      - name: Subir manager APK
        if: ${{ inputs.root_provider == 'sukisu-ultra-v4.1.3' }}
        uses: actions/upload-artifact@v4
        with:
          name: sukisu-manager-${{ github.run_number }}
          path: suki-manager-src/manager/**/*.apk
          retention-days: 14

      - name: Habilitar CONFIG_KSU en overlay
        run: |
          CFG=$(grep -rl "CONFIG_KSU" --include="*.config" . 2>/dev/null | head -n1)
          if [ -z "$CFG" ]; then
            CFG="./kernel/kernel_device_modules-6.6/kernel/configs/mt6768_overlay.config"
            echo "⚠️ No se encontró config existente con CONFIG_KSU, usando default: $CFG"
          fi
          echo "Usando config: $CFG"
          if ! grep -q "CONFIG_KSU=y" "$CFG"; then
            echo "CONFIG_KSU=y" >> "$CFG"
          fi

      - name: Cache de Bazel
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bazel
            ~/.cache/bazelisk
          key: bazel-cache-${{ runner.os }}-${{ inputs.root_provider }}-${{ hashFiles('kernel/WORKSPACE') }}

      - name: Compilar
        run: |
          chmod +x build_kernel.sh
          bash build_kernel.sh

      - name: Verificar que se generó el zip
        run: |
          ls -la *.zip || { echo "❌ No se generó ningún zip, revisar log de Compilar"; exit 1; }

      - name: Subir artifact
        uses: actions/upload-artifact@v4
        with:
          name: a05m-kernel-${{ inputs.root_provider }}-${{ github.run_number }}
          path: "*.zip"
          retention-days: 14

      - name: Crear Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ inputs.root_provider }}-${{ github.run_number }}
          files: "*.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
