
name: Build A05m Kernel
 
on:
  workflow_dispatch:
    inputs:
      root_provider:
        description: "Solución de root"
        type: choice
        options:
          - ksu-next-stable
          - sukisu-ultra-v4.1.3
        default: ksu-next-stable
 
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
 
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
 
      - name: Liberar espacio en el runner
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo apt-get clean
          df -h
 
      - name: Instalar dependencias
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc bison flex libssl-dev \
            libncurses-dev python3 python3-pip zip unzip rsync kmod cpio \
            device-tree-compiler default-jdk git curl patch
 
      - name: Descargar toolchain (con reintentos)
        run: |
          pip install gdown
          for i in 1 2 3; do
            gdown "https://drive.google.com/uc?id=1vsQfRgdNHlD0md9tF7j5fpkL_17whzbH" -O toolchain.tar.gz && break
            echo "Intento $i falló, reintentando en 10s..."
            sleep 10
          done
          test -s toolchain.tar.gz || { echo "❌ No se pudo descargar el toolchain"; exit 1; }
          tar -xf toolchain.tar.gz
 
      - name: Neutralizar setup.sh original en build_kernel.sh
        run: |
          sed -i '/rsuntk\/KernelSU\/main\/kernel\/setup.sh/d' build_kernel.sh
 
      - name: Integrar KernelSU-Next (estable, sin SUSFS)
        if: ${{ inputs.root_provider == 'ksu-next-stable' }}
        working-directory: ./kernel-6.6
        run: |
          curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/refs/heads/dev/kernel/setup.sh" | bash -s dev || \
          curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/refs/heads/next/kernel/setup.sh" | bash -s next
 
          test -d KernelSU-Next || { echo "❌ Falló la integración de KernelSU-Next (ni dev ni next funcionaron)"; exit 1; }
 
      - name: Integrar SukiSU-Ultra (tag v4.1.3, matchea manager público)
        if: ${{ inputs.root_provider == 'sukisu-ultra-v4.1.3' }}
        working-directory: ./kernel-6.6
        run: |
          curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s v4.1.3
 
      - name: Habilitar CONFIG_KSU en overlay
        run: |
          CFG=$(grep -rl "CONFIG_KSU" --include="*.config" . 2>/dev/null | head -n1)
          if [ -z "$CFG" ]; then
            CFG="./kernel/kernel_device_modules-6.6/kernel/configs/mt6768_overlay.config"
            echo "⚠️ No se encontró config existente con CONFIG_KSU, usando default: $CFG"
          fi
          echo "Usando config: $CFG"
          if ! grep -q "CONFIG_KSU=y" "$CFG"; then
            echo "CONFIG_KSU=y" >> "$CFG"
          fi
 
      - name: Cache de Bazel
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bazel
            ~/.cache/bazelisk
          key: bazel-cache-${{ runner.os }}-${{ inputs.root_provider }}-${{ hashFiles('kernel/WORKSPACE') }}
 
      - name: Compilar
        run: |
          chmod +x build_kernel.sh
          bash build_kernel.sh
 
      - name: Verificar que se generó el zip
        run: |
          ls -la *.zip || { echo "❌ No se generó ningún zip, revisar log de Compilar"; exit 1; }
 
      - name: Subir artifact
        uses: actions/upload-artifact@v4
        with:
          name: a05m-kernel-${{ inputs.root_provider }}-${{ github.run_number }}
          path: "*.zip"
          retention-days: 14
